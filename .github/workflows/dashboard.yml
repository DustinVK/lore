name: Validate lore-dashboard package

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
  pull_request:
    paths:
      - 'packages/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/lore-dashboard
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/lore-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build against fixtures
        run: npm run build

      - name: Run fixture checks
        run: npm test
